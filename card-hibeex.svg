<svg xmlns="http://www.w3.org/2000/svg" width="900" height="272" viewBox="0 0 900 272" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#111722"/><stop offset="1" stop-color="#0d1117"/></linearGradient></defs><rect width="900" height="272" rx="12" fill="url(#bg)"/><rect x="0.5" y="0.5" width="899" height="271" rx="12" fill="none" stroke="#30363d" stroke-width="1"/><line x1="0" y1="30" x2="900" y2="30" stroke="#30363d"/><circle cx="20" cy="15.0" r="5" fill="#ff5f56"/><circle cx="36" cy="15.0" r="5" fill="#ffbd2e"/><circle cx="52" cy="15.0" r="5" fill="#27c93f"/><text x="450.0" y="19.0" fill="#7d8590" font-size="12" text-anchor="middle">gabriel@github: ~$ cat hibeex.md</text><g opacity="0" transform="translate(0,5)"><text x="20" y="62.0" fill="#c9d1d9" font-size="12.8">HIBEEX is a B2B financial intelligence platform: it connects to the ERPs Brazilian SMBs already use (Omie, Conta</text><animate attributeName="opacity" from="0" to="1" begin="0.12s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.12s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><text x="20" y="84.0" fill="#c9d1d9" font-size="12.8">Azul, Nibo, VHSYS), syncs their financial data automatically, and turns it into AI-powered cash-flow analysis</text><animate attributeName="opacity" from="0" to="1" begin="0.17s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.17s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><text x="20" y="106.0" fill="#c9d1d9" font-size="12.8">and executive insight - replacing manual spreadsheets.</text><animate attributeName="opacity" from="0" to="1" begin="0.22s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.22s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><text x="20" y="137.9" fill="#c9d1d9" font-size="12.8">As founding builder I architected and shipped the full-stack MVP end-to-end: ERP-to-database sync pipelines,</text><animate attributeName="opacity" from="0" to="1" begin="0.27s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.27s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><text x="20" y="159.9" fill="#c9d1d9" font-size="12.8">transaction reconciliation and categorization engines, multi-tenant auth with RBAC, REST API layers, automated</text><animate attributeName="opacity" from="0" to="1" begin="0.32s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.32s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><text x="20" y="181.9" fill="#c9d1d9" font-size="12.8">ingestion jobs, Claude-powered executive narrative generation, and interactive KPI dashboards.</text><animate attributeName="opacity" from="0" to="1" begin="0.37s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.37s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><text x="20" y="213.8" fill="#c9d1d9" font-size="12.8">Today HIBEEX serves major accounting operations - clients managing 600+ accounting bases, including the 6th</text><animate attributeName="opacity" from="0" to="1" begin="0.42s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.42s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><text x="20" y="235.8" fill="#c9d1d9" font-size="12.8">largest Sistema Dominio user in Brazil - under a 12% revenue-share partnership with VHSYS (~20,000 clients).</text><animate attributeName="opacity" from="0" to="1" begin="0.47s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="0.47s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g></svg>